<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Floating Feedback button rendered in the bottom-right corner of a web app">
  <defs>
    <filter id="btnShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#f3f4f6"/>
  <rect width="600" height="48" fill="#e5e7eb"/>
  <circle cx="20" cy="24" r="6" fill="#ef4444"/>
  <circle cx="40" cy="24" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="24" r="6" fill="#22c55e"/>
  <rect x="40" y="80" width="200" height="14" rx="3" fill="#d1d5db"/>
  <rect x="40" y="104" width="120" height="10" rx="3" fill="#e5e7eb"/>
  <rect x="40" y="140" width="520" height="60" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="40" y="220" width="520" height="60" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="40" y="300" width="320" height="60" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <g filter="url(#btnShadow)">
    <rect x="476" y="348" width="108" height="36" rx="18" fill="#1f2937"/>
    <text x="530" y="371" font-family="-apple-system, system-ui, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Feedback</text>
  </g>
</svg>
